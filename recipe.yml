name: 'Sous Formats'
description: 'A recipe that contains default text and date formats.'
type: 'Site'
install:
  - ckeditor5
  - editor
  - filter
  - linkit
  - media
config:
  # Allow Linkit profile defaults provided by other recipes (for example
  # sous-admin) to differ without blocking this recipe.
  strict:
    - editor.editor.basic_html
    - editor.editor.full_html
    - editor.editor.limited_html
    - editor.editor.restricted_html
    - filter.format.basic_html
    - filter.format.full_html
    - filter.format.limited_html
    - filter.format.restricted_html
  import:
    filter:
      - filter.format.plain_text.yml
    media:
      - core.entity_view_mode.media.full
