langcode: en
status: true
dependencies:
  config:
    - filter.format.full_html
    - linkit.linkit_profile.default
  module:
    - ckeditor5
    - linkit
format: full_html
editor: ckeditor5
settings:
  toolbar:
    items:
      - bold
      - italic
      - underline
      - strikethrough
      - subscript
      - superscript
      - '|'
      - link
      - '|'
      - bulletedList
      - numberedList
      - horizontalLine
      - blockQuote
      - '|'
      - insertTable
      - '|'
      - sourceEditing
  plugins:
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
        styles: true
      multiBlock: true
    ckeditor5_sourceEditing:
      allowed_tags: {  }
    linkit_extension:
      linkit_enabled: true
      linkit_profile: default
image_upload:
  status: false
